<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="25%" style="stop-color:#ffeb3b"/>
      <stop offset="50%" style="stop-color:#9c27b0"/>
      <stop offset="75%" style="stop-color:#4fc3f7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="600" height="200" fill="url(#bg)" rx="12"/>
  <rect x="8" y="8" width="584" height="184" fill="none" stroke="white" stroke-width="2" rx="10" opacity="0.4"/>
  <text x="300" y="75" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="52" font-weight="900" fill="white" filter="url(#glow)">CLI-POMODORO</text>
  <text x="300" y="115" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="white" opacity="0.95">Emoji Art Generator</text>
  <text x="300" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="white" opacity="0.8">Image-to-Mosaic + Text-to-Banner CLI</text>
  <circle cx="100" cy="100" r="25" fill="white" opacity="0.3"/>
  <circle cx="500" cy="100" r="25" fill="white" opacity="0.3"/>
  <text x="100" y="107" text-anchor="middle" font-size="28" fill="white">🎨</text>
  <text x="500" y="107" text-anchor="middle" font-size="28" fill="white">✨</text>
